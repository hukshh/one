
version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    restart: always
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - '6379:6379'

  server:
    build: ./server
    ports:
      - '4000:4000'
    env_file:
      - ./server/.env
    environment:
      - DATABASE_URL=mongodb://mongodb:27017/meetingmind
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NODE_ENV=production
      - PORT=4000
    depends_on:
      - mongodb
      - redis
    volumes:
      - ./server/uploads:/app/uploads

  client:
    build: ./client
    ports:
      - '3000:3000'
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4000/api
    depends_on:
      - server

volumes:
  mongo_data:
